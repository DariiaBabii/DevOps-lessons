applications:
  - name: django-app
    namespace: default
    project: default
    source:            
      repoURL: https://github.com/DariiaBabii/django-helm.git
      path: charts/django-app     
      targetRevision: main
      helm:
        valueFiles:              
          - values.yaml
    destination:                              
      server: https://kubernetes.default.svc  
      namespace: default                      
    syncPolicy:           
      automated:         
        prune: true       
        selfHeal: true    

repositories:
  - name: django-helm
    url: https://github.com/DariiaBabii/django-helm.git
    username: ${github_user}
    password: ${github_pat}

repoConfig:
  insecure: "true"
  enableLfs: "true"
